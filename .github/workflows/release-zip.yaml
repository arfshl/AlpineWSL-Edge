name: Release Zip CI

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
    - name: Install dependencies for build (Apt)
      shell: bash
      run: |
        sudo env DEBIAN_FRONTEND=noninteractive apt update -y && \
        sudo env DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends libarchive-tools curl jq tree
    - name: Build Zip x64
      shell: bash
      env:
        ARCH: 'x64'
        OUT_ZIP: 'Alpine-Edge.zip'
      run: cd src_x64 && make -j$(nproc) -e && sha256sum Alpine-Edge.zip | tee Alpine-Edge.zip.sha256 && mv Alpine-Edge.zip Alpine-Edge.zip.sha256 ../
    - name: Build Zip ARM64
      shell: bash
      env:
        ARCH: 'arm64'
        OUT_ZIP: 'Alpine-Edge_arm64.zip'
      run: cd src_arm64 && make -j$(nproc) -e && sha256sum Alpine-Edge_arm64.zip | tee Alpine-Edge_arm64.zip.sha256 && mv Alpine-Edge_arm64.zip Alpine-Edge_arm64.zip.sha256 ../
    - name: Upload a Build Artifact x64
      uses: actions/upload-artifact@main
      with:
        name: Alpine-Edge.zip
        path: ./Alpine-Edge.zip
    - name: Upload SHA256 Checksum x64
      uses: actions/upload-artifact@main
      with:
        name: Alpine-Edge.zip.sha256
        path: ./Alpine-Edge.zip.sha256
    - name: Upload a Build Artifact ARM64
      uses: actions/upload-artifact@main
      with:
        name: Alpine-Edge_arm64.zip
        path: ./Alpine-Edge_arm64.zip
    - name: Upload SHA256 Checksum ARM64
      uses: actions/upload-artifact@main
      with:
        name: Alpine-Edge_arm64.zip.sha256
        path: ./Alpine-Edge_arm64.zip.sha256

  Release:
    needs: [Build]
    runs-on: ubuntu-24.04
    steps:
    - name: Download Build Artifact x64
      uses: actions/download-artifact@main
      with:
        name: Alpine-Edge.zip
    - name: Download SHA256 Checksum x64
      uses: actions/download-artifact@main
      with:
        name: Alpine-Edge.zip.sha256
    - name: Download Build Artifact arm64
      uses: actions/download-artifact@main
      with:
        name: Alpine-Edge_arm64.zip
    - name: Download SHA256 Checksum arm64
      uses: actions/download-artifact@main
      with:
        name: Alpine-Edge_arm64.zip.sha256

    - name: Push to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        files: |
          Alpine-Edge*.zip*
        preserve_order: true
        make_latest: true